name: Doctore validation

on:
  push:
    paths:
      - "contracts/**"
      - "skills/**"
      - "scripts/validate_skills.py"
      - "tests/**"
      - ".github/workflows/skills-validation.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "skills/**"
      - "scripts/validate_skills.py"
      - "tests/**"
      - ".github/workflows/skills-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: doctore-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skills, schemas and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install validation dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            "PyYAML==6.0.2" \
            "jsonschema[format]==4.23.0"

      - name: Validate Agent Skills structure
        run: python scripts/validate_skills.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v
