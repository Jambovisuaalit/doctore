name: Doctore validation

on:
  push:
    paths:
      - "contracts/**"
      - "src/**"
      - "skills/**"
      - "examples/**"
      - "scripts/validate_skills.py"
      - "tests/**"
      - ".github/workflows/skills-validation.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "src/**"
      - "skills/**"
      - "examples/**"
      - "scripts/validate_skills.py"
      - "tests/**"
      - ".github/workflows/skills-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: doctore-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skills, schemas and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      SOURCE_SHA: ${{ github.sha }}
    steps:
      - name: Prepare repository source without external actions
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import sys
          if sys.version_info < (3, 11):
              raise SystemExit(f"Python 3.11+ required, found {sys.version}")
          print(sys.version)
          PY
          archive="$RUNNER_TEMP/doctore-source.tar.gz"
          source_dir="$RUNNER_TEMP/doctore-source"
          mkdir -p "$source_dir"
          curl --fail --location --silent --show-error \
            --retry 3 --retry-delay 2 \
            "https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${SOURCE_SHA}" \
            --output "$archive"
          tar -xzf "$archive" -C "$source_dir" --strip-components=1
          echo "DOCTORE_SOURCE=$source_dir" >> "$GITHUB_ENV"

      - name: Install validation dependencies
        run: |
          python3 -m pip install --disable-pip-version-check \
            "PyYAML==6.0.2" \
            "jsonschema[format]==4.23.0"

      - name: Compile Python sources
        run: |
          cd "$DOCTORE_SOURCE"
          python3 -m compileall -q src scripts skills tests

      - name: Validate Agent Skills structure
        run: |
          cd "$DOCTORE_SOURCE"
          python3 scripts/validate_skills.py

      - name: Run unit tests
        run: |
          cd "$DOCTORE_SOURCE"
          python3 -m unittest discover -s tests -p 'test_*.py' -v
