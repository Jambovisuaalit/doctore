name: Test Doctore mathematics

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      SOURCE_SHA: ${{ github.sha }}
    steps:
      - name: Prepare repository source without external actions
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import sys
          if sys.version_info < (3, 11):
              raise SystemExit(f"Python 3.11+ required, found {sys.version}")
          print(sys.version)
          PY
          archive="$RUNNER_TEMP/doctore-source.tar.gz"
          source_dir="$RUNNER_TEMP/doctore-source"
          mkdir -p "$source_dir"
          curl --fail --location --silent --show-error \
            --retry 3 --retry-delay 2 \
            "https://codeload.github.com/${GITHUB_REPOSITORY}/tar.gz/${SOURCE_SHA}" \
            --output "$archive"
          tar -xzf "$archive" -C "$source_dir" --strip-components=1
          echo "DOCTORE_SOURCE=$source_dir" >> "$GITHUB_ENV"

      - name: Install test dependencies
        run: |
          cd "$DOCTORE_SOURCE"
          python3 -m pip install --disable-pip-version-check \
            "PyYAML==6.0.2" \
            "jsonschema[format]==4.23.0"
          python3 -m pip install --disable-pip-version-check -r requirements.txt

      - name: Compile Python sources
        run: |
          cd "$DOCTORE_SOURCE"
          python3 -m compileall -q src scripts doctore_mcp tests

      - name: Run unit tests
        run: |
          cd "$DOCTORE_SOURCE"
          python3 -m unittest discover -s tests -p 'test_*.py' -v
